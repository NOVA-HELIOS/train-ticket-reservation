name: Build and Deploy to Amazon EKS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER: ${{ secrets.EKS_CLUSTER }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR
        run: mvn clean package -DskipTests

      - name: Verify WAR
        run: ls -lh target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_URI

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Replace Image in Deployment
        run: |
          sed -i "s|<IMAGE>|${IMAGE_URI}|g" K8S/deployment.yaml

      - name: Deploy Namespace
        run: |
          kubectl apply -f K8S/namespace.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -f K8S/deployment.yaml
          kubectl apply -f K8S/service.yaml

      - name: Wait for Deployment
        run: |
          kubectl rollout status deployment/train-ticket-deployment -n train-ticket

      - name: Verify Deployment
        run: |
          kubectl get pods -n train-ticket
          kubectl get svc -n train-ticket
